<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>💀 MOBILE DESTROYER 💀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #FF0000 50%, #8B0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            animation: pulse 2s infinite;
            overflow-x: hidden;
        }

        @keyframes pulse {
            0%, 100% { background: linear-gradient(135deg, #8B0000 0%, #FF0000 50%, #8B0000 100%); }
            50% { background: linear-gradient(135deg, #FF0000 0%, #8B0000 50%, #FF0000 100%); }
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(255, 0, 0, 0.5);
            max-width: 100%;
            width: 100%;
            border: 3px solid #FF0000;
            overflow-y: auto;
            max-height: 95vh;
        }

        h1 {
            color: #FF0000;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.8em;
            text-shadow: 0 0 10px #FF0000, 0 0 20px #FF0000;
            animation: glow 1s infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #FF0000, 0 0 20px #FF0000; }
            50% { text-shadow: 0 0 20px #FF0000, 0 0 40px #FF0000, 0 0 60px #FF0000; }
        }

        .device-info {
            background: rgba(255, 255, 0, 0.2);
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            color: #FFD700;
            text-align: center;
            font-size: 0.9em;
        }

        .warning {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #FF0000;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            color: #FFD700;
            text-align: center;
            font-size: 1em;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.6; }
        }

        .start-section {
            text-align: center;
            margin-bottom: 20px;
        }

        #startBtn {
            background: linear-gradient(45deg, #8B0000, #FF0000, #8B0000);
            color: white;
            border: 3px solid #FF0000;
            padding: 20px 50px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            font-weight: bold;
            width: 100%;
            max-width: 350px;
            touch-action: manipulation;
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        #startBtn:disabled {
            background: #333;
            opacity: 0.5;
        }

        .status {
            margin: 20px 0;
            text-align: center;
        }

        .status-text {
            color: #FF0000;
            font-size: 1.2em;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .loader {
            display: none;
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 0, 0, 0.3);
            border-top: 6px solid #FF0000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .system-info {
            display: none;
        }

        .resource-section {
            background: rgba(255, 0, 0, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid rgba(255, 0, 0, 0.3);
        }

        .resource-label {
            color: #FF0000;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .resource-icon {
            font-size: 1.4em;
        }

        .resource-bar {
            background: rgba(0, 0, 0, 0.5);
            height: 35px;
            border-radius: 18px;
            overflow: hidden;
            margin: 10px 0;
            border: 2px solid rgba(255, 0, 0, 0.5);
        }

        .resource-fill {
            height: 100%;
            width: 0%;
            transition: width 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1em;
        }

        .cpu-fill {
            background: linear-gradient(90deg, #FF0000, #8B0000, #FF0000);
        }

        .ram-fill {
            background: linear-gradient(90deg, #FF6B00, #FF0000, #FF6B00);
        }

        .gpu-fill {
            background: linear-gradient(90deg, #FFD700, #FF4500, #FFD700);
        }

        .log-container {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 15px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            display: none;
            margin-top: 20px;
            border: 2px solid #FF0000;
        }

        .log-entry {
            color: #0f0;
            font-size: 0.85em;
            margin: 5px 0;
            animation: fadeIn 0.3s;
            line-height: 1.4;
        }

        .log-entry.warning { color: #fbbf24; }
        .log-entry.error { color: #FF0000; font-weight: bold; }
        .log-entry.info { color: #60a5fa; }
        .log-entry.success { color: #4ade80; }
        .log-entry.critical { 
            color: #FF0000; 
            font-weight: bold;
            animation: blink 0.5s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .stats {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(255, 0, 0, 0.5);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #FF0000;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 0 0 10px #FF0000;
        }

        #stopBtn {
            background: linear-gradient(45deg, #000000, #333333);
            color: white;
            border: 3px solid #FF0000;
            padding: 18px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.6);
            font-weight: bold;
            display: none;
            margin: 20px auto;
            width: 100%;
            max-width: 300px;
            touch-action: manipulation;
        }

        #stopBtn:active {
            transform: scale(0.95);
        }

        #gpuCanvas {
            display: none;
            position: absolute;
            width: 1px;
            height: 1px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 0, 0, 0.5);
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            h1 { font-size: 2.2em; }
            .stats { grid-template-columns: repeat(4, 1fr); }
            .container { padding: 35px; }
        }
    </style>
</head>
<body>
    <canvas id="gpuCanvas"></canvas>
    <div class="container">
        <h1>💀 MOBILE DESTROYER 💀</h1>
        
        <div class="device-info" id="deviceInfo">
            📱 Đang phát hiện thiết bị...
        </div>

        <div class="warning">
            ⚠️ CẢNH BÁO: THIẾT BỊ CỦA BẠN SẼ BỊ TẢI CỰC MẠNH!<br>
            Pin sẽ nóng lên! Có thể lag hoặc crash!
        </div>
        
        <div class="start-section">
            <button id="startBtn">🔥 BẮT ĐẦU 🔥</button>
        </div>

        <div class="status">
            <div class="status-text" id="statusText"></div>
            <div class="loader" id="loader"></div>
        </div>

        <div class="system-info" id="systemInfo">
            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">🔥</span> CPU
                </div>
                <div class="resource-bar">
                    <div class="resource-fill cpu-fill" id="cpuFill">0%</div>
                </div>
            </div>

            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">💾</span> RAM
                </div>
                <div class="resource-bar">
                    <div class="resource-fill ram-fill" id="ramFill">0%</div>
                </div>
            </div>

            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">🎮</span> GPU
                </div>
                <div class="resource-bar">
                    <div class="resource-fill gpu-fill" id="gpuFill">0%</div>
                </div>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="stat-label">Threads</div>
                <div class="stat-value" id="threads">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">RAM</div>
                <div class="stat-value" id="ramAllocated">0 MB</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">GPU Frames</div>
                <div class="stat-value" id="gpuFrames">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">0s</div>
            </div>
        </div>

        <button id="stopBtn">⛔ DỪNG NGAY ⛔</button>

        <div class="log-container" id="logContainer"></div>
    </div>

    <script>
        let workers = [];
        let isRunning = false;
        let startTime;
        let ramArrays = [];
        let gpuAnimationId;
        let gpuFrameCount = 0;
        let logInterval;
        let statsInterval;
        let extraCanvases = [];
        let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        let isIPad = /iPad|Macintosh/i.test(navigator.userAgent) && 'ontouchend' in document;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const systemInfo = document.getElementById('systemInfo');
        const cpuFill = document.getElementById('cpuFill');
        const ramFill = document.getElementById('ramFill');
        const gpuFill = document.getElementById('gpuFill');
        const logContainer = document.getElementById('logContainer');
        const stats = document.getElementById('stats');
        const threadsEl = document.getElementById('threads');
        const ramAllocatedEl = document.getElementById('ramAllocated');
        const gpuFramesEl = document.getElementById('gpuFrames');
        const timeEl = document.getElementById('time');
        const deviceInfo = document.getElementById('deviceInfo');
        const canvas = document.getElementById('gpuCanvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        // Detect device
        let cores = navigator.hardwareConcurrency || 4;
        let deviceType = isIPad ? '📱 iPad' : (isMobile ? '📱 Mobile' : '💻 Desktop');
        let maxThreads = isIPad ? 16 : (isMobile ? 8 : 32);
        let maxRAM = isIPad ? 2000 : (isMobile ? 1000 : 3000);
        let gpuComplexity = isIPad ? 'medium' : (isMobile ? 'low' : 'high');

        deviceInfo.innerHTML = `${deviceType} | ${cores} Cores | Max ${maxThreads} Threads`;

        const logMessages = [
            { type: 'critical', msg: '💀 OVERLOAD!' },
            { type: 'error', msg: '🔥 CPU HOT!' },
            { type: 'critical', msg: '⚠️ BATTERY DRAIN!' },
            { type: 'error', msg: '💥 GPU STRESS!' },
            { type: 'warning', msg: '🌡️ Temperature rising!' },
            { type: 'critical', msg: '☢️ MAX LOAD!' },
            { type: 'warning', msg: '💾 RAM pressure!' },
            { type: 'error', msg: '⚡ Power usage MAX!' },
            { type: 'info', msg: '📊 All cores busy!' },
            { type: 'critical', msg: '☠️ DANGER LEVEL!' }
        ];

        function addLog(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            if (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.children[0]);
            }
        }

        function updateStats() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            timeEl.textContent = elapsed + 's';
            
            const ramUsed = Math.floor(ramArrays.length * 100);
            ramAllocatedEl.textContent = ramUsed + ' MB';
            
            gpuFramesEl.textContent = gpuFrameCount.toLocaleString();
        }

        function startCPUStress() {
            threadsEl.textContent = maxThreads;

            for (let i = 0; i < maxThreads; i++) {
                const iterations = isMobile ? 5000000 : 10000000;
                const workerCode = `
                    self.onmessage = function(e) {
                        if (e.data === 'start') {
                            while (true) {
                                let result = 0;
                                for (let i = 0; i < ${iterations}; i++) {
                                    result += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                                    result += Math.pow(i, 2) / (i + 1);
                                    result += Math.tan(i) * Math.log(i + 1);
                                    result += Math.exp(i % 10) / (i + 1);
                                    result += Math.atan2(i, i + 1);
                                    
                                    if (i % 100000 === 0) {
                                        let temp = result;
                                        for (let j = 0; j < 5; j++) {
                                            temp = Math.sqrt(Math.abs(temp)) + Math.sin(temp);
                                        }
                                        result += temp;
                                    }
                                }
                                self.postMessage(result);
                            }
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                
                worker.postMessage('start');
                workers.push(worker);
            }
        }

        function startRAMStress() {
            const allocateRAM = () => {
                if (!isRunning) return;
                
                const size = 100 * 1024 * 1024;
                const array = new Uint8Array(size);
                
                for (let i = 0; i < array.length; i += 100) {
                    array[i] = Math.floor(Math.random() * 256);
                }
                
                ramArrays.push(array);
                
                const ramPercent = Math.min(100, (ramArrays.length * 5));
                ramFill.style.width = ramPercent + '%';
                ramFill.textContent = ramPercent + '%';
                
                if (ramArrays.length * 100 < maxRAM && isRunning) {
                    setTimeout(allocateRAM, 100);
                }
            };
            
            allocateRAM();
        }

        function startGPUStress() {
            if (!gl) {
                addLog('WebGL not supported', 'warning');
                return;
            }

            canvas.width = isIPad ? 2048 : (isMobile ? 1920 : 3840);
            canvas.height = isIPad ? 1536 : (isMobile ? 1080 : 2160);

            const vertexShaderSource = `
                attribute vec2 position;
                varying vec2 vUv;
                void main() {
                    vUv = position * 0.5 + 0.5;
                    gl_Position = vec4(position, 0.0, 1.0);
                }
            `;

            const iterations = isIPad ? 12 : (isMobile ? 8 : 16);
            const fragmentShaderSource = `
                precision ${isMobile ? 'mediump' : 'highp'} float;
                uniform float time;
                varying vec2 vUv;
                
                float hash(vec2 p) {
                    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                }
                
                float noise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    f = f * f * (3.0 - 2.0 * f);
                    return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
                               mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
                }
                
                float fbm(vec2 p) {
                    float value = 0.0;
                    float amplitude = 0.5;
                    for(int i = 0; i < ${iterations}; i++) {
                        value += amplitude * noise(p);
                        p *= 2.0;
                        amplitude *= 0.5;
                    }
                    return value;
                }
                
                void main() {
                    vec2 uv = vUv * 20.0;
                    float n = fbm(uv + time * 0.5);
                    vec3 color = vec3(
                        sin(n * 10.0 + time),
                        cos(n * 8.0 + time * 1.5),
                        sin(n * 6.0 + time * 2.0)
                    ) * 0.5 + 0.5;
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            function createShader(type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                return shader;
            }

            const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
            const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);
            gl.useProgram(program);

            const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

            const position = gl.getAttribLocation(program, 'position');
            gl.enableVertexAttribArray(position);
            gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

            const timeLocation = gl.getUniformLocation(program, 'time');

            let gpuPercent = 0;
            const gpuPercentInterval = setInterval(() => {
                if (gpuPercent < 100) {
                    gpuPercent += 25;
                    if (gpuPercent > 100) gpuPercent = 100;
                    gpuFill.style.width = gpuPercent + '%';
                    gpuFill.textContent = gpuPercent + '%';
                } else {
                    clearInterval(gpuPercentInterval);
                }
            }, 50);

            const renders = isIPad ? 10 : (isMobile ? 5 : 20);

            function render() {
                if (!isRunning) return;

                const time = performance.now() / 1000;

                for (let i = 0; i < renders; i++) {
                    gl.uniform1f(timeLocation, time + i * 0.01);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                }
                
                gpuFrameCount += renders;
                gpuAnimationId = requestAnimationFrame(render);
            }

            render();
        }

        startBtn.addEventListener('click', function() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.disabled = true;
            statusText.textContent = 'Đang khởi động...';
            loader.style.display = 'block';
            
            setTimeout(() => {
                statusText.textContent = '🔥 Đang chạy stress test!';
                systemInfo.style.display = 'block';
                stats.style.display = 'grid';
                logContainer.style.display = 'block';
                stopBtn.style.display = 'block';
                
                let cpuUsage = 0;
                const cpuInterval = setInterval(() => {
                    if (cpuUsage < 100) {
                        cpuUsage += 33;
                        if (cpuUsage > 100) cpuUsage = 100;
                        cpuFill.style.width = cpuUsage + '%';
                        cpuFill.textContent = cpuUsage + '%';
                    } else {
                        clearInterval(cpuInterval);
                    }
                }, 30);
                
                startTime = Date.now();
                
                addLog(`${deviceType} stress test started!`, 'success');
                addLog(`Starting ${maxThreads} CPU threads...`, 'info');
                startCPUStress();
                
                setTimeout(() => {
                    addLog('RAM allocation started...', 'info');
                    startRAMStress();
                }, 200);
                
                setTimeout(() => {
                    addLog('GPU stress initiated...', 'info');
                    startGPUStress();
                }, 300);
                
                logInterval = setInterval(() => {
                    const randomLog = logMessages[Math.floor(Math.random() * logMessages.length)];
                    addLog(randomLog.msg, randomLog.type);
                }, 400);
                
                statsInterval = setInterval(updateStats, 1000);
                
            }, 1000);
        });

        stopBtn.addEventListener('click', function() {
            isRunning = false;
            
            workers.forEach(worker => worker.terminate());
            workers = [];
            ramArrays = [];
            
            if (gpuAnimationId) {
                cancelAnimationFrame(gpuAnimationId);
            }
            
            extraCanvases = [];
            clearInterval(logInterval);
            clearInterval(statsInterval);
            
            statusText.textContent = '⛔ Đã dừng!';
            loader.style.display = 'none';
            addLog('Stress test stopped', 'warning');
            addLog('Cleaning up resources...', 'info');
            addLog('All threads terminated', 'success');
            
            setTimeout(() => {
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
                cpuFill.style.width = '0%';
                cpuFill.textContent = '0%';
                ramFill.style.width = '0%';
                ramFill.textContent = '0%';
                gpuFill.style.width = '0%';
                gpuFill.textContent = '0%';
                gpuFrameCount = 0;
            }, 1000);
        });
    </script>
</body>
</html>
