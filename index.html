<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Stress Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .start-section {
            text-align: center;
        }

        #startBtn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(238, 90, 111, 0.4);
            font-weight: bold;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 111, 0.6);
        }

        #startBtn:active {
            transform: translateY(0);
        }

        #startBtn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin: 30px 0;
            text-align: center;
        }

        .status-text {
            color: #fff;
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .loader {
            display: none;
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .cpu-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            display: none;
        }

        .cpu-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }

        .cpu-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e, #16a34a);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            display: none;
            margin-top: 20px;
        }

        .log-entry {
            color: #0f0;
            font-size: 0.9em;
            margin: 5px 0;
            animation: fadeIn 0.3s;
        }

        .log-entry.warning {
            color: #fbbf24;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .log-entry.info {
            color: #60a5fa;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .stats {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 1.5em;
            font-weight: bold;
        }

        #stopBtn {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            font-weight: bold;
            display: none;
            margin: 20px auto;
        }

        #stopBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ CPU Stress Test Simulator ⚡</h1>
        
        <div class="start-section">
            <button id="startBtn">BẮT ĐẦU</button>
        </div>

        <div class="status">
            <div class="status-text" id="statusText"></div>
            <div class="loader" id="loader"></div>
        </div>

        <div class="cpu-info" id="cpuInfo">
            <div class="stat-label">CPU Usage</div>
            <div class="cpu-bar">
                <div class="cpu-fill" id="cpuFill">0%</div>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="stat-label">Threads</div>
                <div class="stat-value" id="threads">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Operations</div>
                <div class="stat-value" id="operations">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">0s</div>
            </div>
        </div>

        <button id="stopBtn">DỪNG LẠI</button>

        <div class="log-container" id="logContainer"></div>
    </div>

    <script>
        let workers = [];
        let isRunning = false;
        let startTime;
        let operations = 0;
        let logInterval;
        let statsInterval;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const cpuInfo = document.getElementById('cpuInfo');
        const cpuFill = document.getElementById('cpuFill');
        const logContainer = document.getElementById('logContainer');
        const stats = document.getElementById('stats');
        const threadsEl = document.getElementById('threads');
        const operationsEl = document.getElementById('operations');
        const timeEl = document.getElementById('time');

        const logMessages = [
            { type: 'info', msg: 'Initializing CPU stress test...' },
            { type: 'info', msg: 'Allocating memory buffers...' },
            { type: 'warning', msg: 'High CPU usage detected!' },
            { type: 'info', msg: 'Running prime number calculations...' },
            { type: 'info', msg: 'Executing matrix operations...' },
            { type: 'warning', msg: 'Temperature rising...' },
            { type: 'info', msg: 'Processing cryptographic hashing...' },
            { type: 'info', msg: 'Computing Fibonacci sequences...' },
            { type: 'warning', msg: 'System load increasing...' },
            { type: 'info', msg: 'Running floating-point operations...' },
            { type: 'info', msg: 'Executing parallel computations...' },
            { type: 'error', msg: 'WARNING: Maximum load reached!' },
            { type: 'info', msg: 'Processing data streams...' },
            { type: 'info', msg: 'Computing mathematical operations...' },
            { type: 'warning', msg: 'Resource usage at 100%!' }
        ];

        function addLog(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateStats() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            timeEl.textContent = elapsed + 's';
            operationsEl.textContent = operations.toLocaleString();
        }

        function startCPUStress() {
            const numThreads = navigator.hardwareConcurrency || 6;
            threadsEl.textContent = numThreads;

            for (let i = 0; i < numThreads; i++) {
                const workerCode = `
                    self.onmessage = function(e) {
                        if (e.data === 'start') {
                            while (true) {
                                let result = 0;
                                for (let i = 0; i < 1000000; i++) {
                                    result += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                                    result += Math.pow(i, 2) / (i + 1);
                                }
                                self.postMessage(result);
                            }
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                
                worker.onmessage = function() {
                    operations++;
                };
                
                worker.postMessage('start');
                workers.push(worker);
            }
        }

        startBtn.addEventListener('click', function() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.disabled = true;
            statusText.textContent = 'Đang khởi động...';
            loader.style.display = 'block';
            
            setTimeout(() => {
                statusText.textContent = 'Đang chạy CPU ở công suất tối đa!';
                cpuInfo.style.display = 'block';
                stats.style.display = 'grid';
                logContainer.style.display = 'block';
                stopBtn.style.display = 'block';
                
                let cpuUsage = 0;
                const cpuInterval = setInterval(() => {
                    if (cpuUsage < 100) {
                        cpuUsage += 10;
                        cpuFill.style.width = cpuUsage + '%';
                        cpuFill.textContent = cpuUsage + '%';
                    } else {
                        clearInterval(cpuInterval);
                    }
                }, 100);
                
                startTime = Date.now();
                startCPUStress();
                
                addLog('System initialized successfully', 'info');
                addLog(`Starting ${workers.length} worker threads...`, 'info');
                
                logInterval = setInterval(() => {
                    const randomLog = logMessages[Math.floor(Math.random() * logMessages.length)];
                    addLog(randomLog.msg, randomLog.type);
                }, 800);
                
                statsInterval = setInterval(updateStats, 1000);
                
            }, 1500);
        });

        stopBtn.addEventListener('click', function() {
            isRunning = false;
            
            workers.forEach(worker => worker.terminate());
            workers = [];
            
            clearInterval(logInterval);
            clearInterval(statsInterval);
            
            statusText.textContent = 'Đã dừng!';
            loader.style.display = 'none';
            addLog('Stress test stopped by user', 'warning');
            addLog('Cleaning up resources...', 'info');
            addLog('All threads terminated', 'info');
            
            setTimeout(() => {
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
                cpuFill.style.width = '0%';
                cpuFill.textContent = '0%';
            }, 1000);
        });
    </script>
</body>
</html>
