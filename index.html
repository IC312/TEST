<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Stress Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .start-section {
            text-align: center;
        }

        #startBtn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(238, 90, 111, 0.4);
            font-weight: bold;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 111, 0.6);
        }

        #startBtn:active {
            transform: translateY(0);
        }

        #startBtn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin: 30px 0;
            text-align: center;
        }

        .status-text {
            color: #fff;
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .loader {
            display: none;
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .system-info {
            display: none;
        }

        .resource-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .resource-label {
            color: #fff;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .resource-icon {
            font-size: 1.3em;
        }

        .resource-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }

        .resource-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .cpu-fill {
            background: linear-gradient(90deg, #4ade80, #22c55e, #16a34a);
        }

        .ram-fill {
            background: linear-gradient(90deg, #60a5fa, #3b82f6, #2563eb);
        }

        .gpu-fill {
            background: linear-gradient(90deg, #f59e0b, #f97316, #ea580c);
        }

        .log-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            display: none;
            margin-top: 20px;
        }

        .log-entry {
            color: #0f0;
            font-size: 0.9em;
            margin: 5px 0;
            animation: fadeIn 0.3s;
        }

        .log-entry.warning {
            color: #fbbf24;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .log-entry.info {
            color: #60a5fa;
        }

        .log-entry.success {
            color: #4ade80;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .stats {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 1.5em;
            font-weight: bold;
        }

        #stopBtn {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            font-weight: bold;
            display: none;
            margin: 20px auto;
        }

        #stopBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        #gpuCanvas {
            display: none;
            width: 1px;
            height: 1px;
            position: absolute;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gpuCanvas"></canvas>
    <div class="container">
        <h1>⚡ SYSTEM STRESS TEST ⚡</h1>
        
        <div class="start-section">
            <button id="startBtn">BẮT ĐẦU</button>
        </div>

        <div class="status">
            <div class="status-text" id="statusText"></div>
            <div class="loader" id="loader"></div>
        </div>

        <div class="system-info" id="systemInfo">
            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">🔥</span> CPU Usage
                </div>
                <div class="resource-bar">
                    <div class="resource-fill cpu-fill" id="cpuFill">0%</div>
                </div>
            </div>

            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">💾</span> RAM Usage
                </div>
                <div class="resource-bar">
                    <div class="resource-fill ram-fill" id="ramFill">0%</div>
                </div>
            </div>

            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">🎮</span> GPU Usage
                </div>
                <div class="resource-bar">
                    <div class="resource-fill gpu-fill" id="gpuFill">0%</div>
                </div>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="stat-label">Threads</div>
                <div class="stat-value" id="threads">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">RAM Allocated</div>
                <div class="stat-value" id="ramAllocated">0 MB</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">GPU Frames</div>
                <div class="stat-value" id="gpuFrames">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">0s</div>
            </div>
        </div>

        <button id="stopBtn">DỪNG LẠI</button>

        <div class="log-container" id="logContainer"></div>
    </div>

    <script>
        let workers = [];
        let isRunning = false;
        let startTime;
        let ramArrays = [];
        let gpuAnimationId;
        let gpuFrameCount = 0;
        let logInterval;
        let statsInterval;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const systemInfo = document.getElementById('systemInfo');
        const cpuFill = document.getElementById('cpuFill');
        const ramFill = document.getElementById('ramFill');
        const gpuFill = document.getElementById('gpuFill');
        const logContainer = document.getElementById('logContainer');
        const stats = document.getElementById('stats');
        const threadsEl = document.getElementById('threads');
        const ramAllocatedEl = document.getElementById('ramAllocated');
        const gpuFramesEl = document.getElementById('gpuFrames');
        const timeEl = document.getElementById('time');
        const canvas = document.getElementById('gpuCanvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        const logMessages = [
            { type: 'info', msg: 'Initializing system stress test...' },
            { type: 'success', msg: 'CPU threads spawned successfully' },
            { type: 'info', msg: 'Allocating RAM buffers...' },
            { type: 'warning', msg: 'High CPU usage detected!' },
            { type: 'info', msg: 'Running prime number calculations...' },
            { type: 'info', msg: 'Executing matrix operations...' },
            { type: 'warning', msg: 'Temperature rising...' },
            { type: 'success', msg: 'RAM allocation complete' },
            { type: 'info', msg: 'GPU rendering pipeline active' },
            { type: 'info', msg: 'Processing cryptographic hashing...' },
            { type: 'info', msg: 'Computing Fibonacci sequences...' },
            { type: 'warning', msg: 'System load increasing...' },
            { type: 'info', msg: 'Running floating-point operations...' },
            { type: 'success', msg: 'GPU shader compilation complete' },
            { type: 'info', msg: 'Executing parallel computations...' },
            { type: 'error', msg: 'WARNING: Maximum load reached!' },
            { type: 'info', msg: 'Processing data streams...' },
            { type: 'info', msg: 'Memory pressure increasing...' },
            { type: 'warning', msg: 'RAM usage at critical level!' },
            { type: 'info', msg: 'GPU rendering complex scenes...' },
            { type: 'success', msg: 'All systems operational' },
            { type: 'warning', msg: 'Resource usage at 100%!' }
        ];

        function addLog(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateStats() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            timeEl.textContent = elapsed + 's';
            
            const ramUsed = (ramArrays.length * 50);
            ramAllocatedEl.textContent = ramUsed + ' MB';
            
            gpuFramesEl.textContent = gpuFrameCount.toLocaleString();
        }

        function startCPUStress() {
            const numThreads = 64;
            threadsEl.textContent = numThreads;

            for (let i = 0; i < numThreads; i++) {
                const workerCode = `
                    self.onmessage = function(e) {
                        if (e.data === 'start') {
                            while (true) {
                                let result = 0;
                                for (let i = 0; i < 5000000; i++) {
                                    result += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                                    result += Math.pow(i, 2) / (i + 1);
                                    result += Math.tan(i) * Math.log(i + 1);
                                    result += Math.exp(i % 10) / (i + 1);
                                    result += Math.atan2(i, i + 1) * Math.sinh(i % 5);
                                    result += Math.cosh(i % 7) * Math.tanh(i % 3);
                                    result += Math.asin(Math.sin(i)) * Math.acos(Math.cos(i));
                                    result += Math.cbrt(i) * Math.hypot(i, i + 1);
                                }
                                self.postMessage(result);
                            }
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                
                worker.postMessage('start');
                workers.push(worker);
            }
        }

        function startRAMStress() {
            const allocateRAM = () => {
                if (!isRunning) return;
                
                const size = 100 * 1024 * 1024;
                const array = new Uint8Array(size);
                
                for (let i = 0; i < array.length; i += 500) {
                    array[i] = Math.floor(Math.random() * 256);
                }
                
                ramArrays.push(array);
                
                const ramPercent = Math.min(100, (ramArrays.length * 2));
                ramFill.style.width = ramPercent + '%';
                ramFill.textContent = ramPercent + '%';
                
                if (ramArrays.length < 50 && isRunning) {
                    setTimeout(allocateRAM, 100);
                }
            };
            
            allocateRAM();
        }

        function startGPUStress() {
            if (!gl) {
                addLog('WebGL not supported, GPU stress skipped', 'warning');
                return;
            }

            canvas.width = 3840;
            canvas.height = 2160;

            const vertexShaderSource = `
                attribute vec2 position;
                varying vec2 vUv;
                void main() {
                    vUv = position * 0.5 + 0.5;
                    gl_Position = vec4(position, 0.0, 1.0);
                }
            `;

            const fragmentShaderSource = `
                precision highp float;
                uniform float time;
                varying vec2 vUv;
                
                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                }
                
                float fbm(vec2 p) {
                    float value = 0.0;
                    float amplitude = 0.5;
                    for(int i = 0; i < 12; i++) {
                        value += amplitude * noise(p);
                        p *= 2.0;
                        amplitude *= 0.5;
                    }
                    return value;
                }
                
                float pattern(vec2 p) {
                    float result = 0.0;
                    for(int i = 0; i < 10; i++) {
                        float fi = float(i);
                        result += fbm(p * (fi + 1.0) + time * (fi * 0.1));
                    }
                    return result;
                }
                
                void main() {
                    vec2 uv = vUv * 30.0;
                    
                    float n1 = pattern(uv + time * 0.5);
                    float n2 = pattern(uv * 2.0 - time * 0.3);
                    float n3 = pattern(uv * 3.0 + time * 0.7);
                    
                    float r = sin(n1 * 15.0 + time) * 0.5 + 0.5;
                    float g = sin(n2 * 15.0 + time * 1.5) * 0.5 + 0.5;
                    float b = sin(n3 * 15.0 + time * 2.0) * 0.5 + 0.5;
                    
                    for(int i = 0; i < 10; i++) {
                        float fi = float(i);
                        r += sin(uv.x * (fi + 1.0) + time * (fi + 1.0)) * 0.05;
                        g += cos(uv.y * (fi + 1.0) + time * (fi + 1.5)) * 0.05;
                        b += sin((uv.x + uv.y) * (fi + 1.0) + time * (fi + 2.0)) * 0.05;
                    }
                    
                    r = pow(r, 2.0);
                    g = pow(g, 2.0);
                    b = pow(b, 2.0);
                    
                    gl_FragColor = vec4(r, g, b, 1.0);
                }
            `;

            function createShader(type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                return shader;
            }

            const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
            const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);
            gl.useProgram(program);

            const vertices = new Float32Array([
                -1, -1,
                1, -1,
                -1, 1,
                1, 1
            ]);

            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

            const position = gl.getAttribLocation(program, 'position');
            gl.enableVertexAttribArray(position);
            gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

            const timeLocation = gl.getUniformLocation(program, 'time');

            let gpuPercent = 0;
            const gpuPercentInterval = setInterval(() => {
                if (gpuPercent < 100) {
                    gpuPercent += 25;
                    if (gpuPercent > 100) gpuPercent = 100;
                    gpuFill.style.width = gpuPercent + '%';
                    gpuFill.textContent = gpuPercent + '%';
                } else {
                    clearInterval(gpuPercentInterval);
                }
            }, 50);

            function render() {
                if (!isRunning) return;

                for (let i = 0; i < 5; i++) {
                    gl.uniform1f(timeLocation, performance.now() / 1000 + i * 0.1);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    gl.finish();
                }
                
                gpuFrameCount += 5;

                gpuAnimationId = requestAnimationFrame(render);
            }

            render();
        }

        startBtn.addEventListener('click', function() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.disabled = true;
            statusText.textContent = 'Đang khởi động hệ thống...';
            loader.style.display = 'block';
            
            setTimeout(() => {
                statusText.textContent = 'Stress Test đang chạy toàn bộ hệ thống!';
                systemInfo.style.display = 'block';
                stats.style.display = 'grid';
                logContainer.style.display = 'block';
                stopBtn.style.display = 'block';
                
                let cpuUsage = 0;
                const cpuInterval = setInterval(() => {
                    if (cpuUsage < 100) {
                        cpuUsage += 25;
                        if (cpuUsage > 100) cpuUsage = 100;
                        cpuFill.style.width = cpuUsage + '%';
                        cpuFill.textContent = cpuUsage + '%';
                    } else {
                        clearInterval(cpuInterval);
                    }
                }, 50);
                
                startTime = Date.now();
                
                addLog('System stress test initialized', 'success');
                addLog('Starting CPU stress with 32 threads...', 'info');
                startCPUStress();
                
                setTimeout(() => {
                    addLog('Initiating RAM allocation...', 'info');
                    startRAMStress();
                }, 300);
                
                setTimeout(() => {
                    addLog('Starting GPU stress test...', 'info');
                    startGPUStress();
                }, 400);
                
                logInterval = setInterval(() => {
                    const randomLog = logMessages[Math.floor(Math.random() * logMessages.length)];
                    addLog(randomLog.msg, randomLog.type);
                }, 700);
                
                statsInterval = setInterval(updateStats, 1000);
                
            }, 1500);
        });

        stopBtn.addEventListener('click', function() {
            isRunning = false;
            
            workers.forEach(worker => worker.terminate());
            workers = [];
            
            ramArrays = [];
            
            if (gpuAnimationId) {
                cancelAnimationFrame(gpuAnimationId);
            }
            
            clearInterval(logInterval);
            clearInterval(statsInterval);
            
            statusText.textContent = 'Đã dừng!';
            loader.style.display = 'none';
            addLog('Stress test stopped by user', 'warning');
            addLog('Terminating all CPU threads...', 'info');
            addLog('Releasing RAM allocations...', 'info');
            addLog('Stopping GPU rendering...', 'info');
            addLog('All resources cleaned up successfully', 'success');
            
            setTimeout(() => {
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
                cpuFill.style.width = '0%';
                cpuFill.textContent = '0%';
                ramFill.style.width = '0%';
                ramFill.textContent = '0%';
                gpuFill.style.width = '0%';
                gpuFill.textContent = '0%';
                gpuFrameCount = 0;
            }, 1000);
        });
    </script>
</body>
</html>
