<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💀 ULTIMATE SYSTEM DESTROYER 💀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #8B0000 0%, #FF0000 50%, #8B0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { background: linear-gradient(135deg, #8B0000 0%, #FF0000 50%, #8B0000 100%); }
            50% { background: linear-gradient(135deg, #FF0000 0%, #8B0000 50%, #FF0000 100%); }
        }

        .container {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(255, 0, 0, 0.5);
            max-width: 900px;
            width: 100%;
            border: 3px solid #FF0000;
        }

        h1 {
            color: #FF0000;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px #FF0000, 0 0 20px #FF0000;
            animation: glow 1s infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #FF0000, 0 0 20px #FF0000; }
            50% { text-shadow: 0 0 20px #FF0000, 0 0 40px #FF0000, 0 0 60px #FF0000; }
        }

        .warning {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #FF0000;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            color: #FFD700;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }

        .start-section {
            text-align: center;
        }

        #startBtn {
            background: linear-gradient(45deg, #8B0000, #FF0000, #8B0000);
            color: white;
            border: 3px solid #FF0000;
            padding: 25px 80px;
            font-size: 2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            font-weight: bold;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #startBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 0, 0, 1);
        }

        #startBtn:disabled {
            background: #333;
            cursor: not-allowed;
            animation: none;
        }

        .status {
            margin: 30px 0;
            text-align: center;
        }

        .status-text {
            color: #FF0000;
            font-size: 1.5em;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .loader {
            display: none;
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 0, 0, 0.3);
            border-top: 8px solid #FF0000;
            border-radius: 50%;
            animation: spin 0.5s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .system-info {
            display: none;
        }

        .resource-section {
            background: rgba(255, 0, 0, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid rgba(255, 0, 0, 0.3);
        }

        .resource-label {
            color: #FF0000;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .resource-icon {
            font-size: 1.5em;
        }

        .resource-bar {
            background: rgba(0, 0, 0, 0.5);
            height: 40px;
            border-radius: 20px;
            overflow: hidden;
            margin: 10px 0;
            border: 2px solid rgba(255, 0, 0, 0.5);
        }

        .resource-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
        }

        .cpu-fill {
            background: linear-gradient(90deg, #FF0000, #8B0000, #FF0000);
            animation: fillPulse 0.5s infinite;
        }

        .ram-fill {
            background: linear-gradient(90deg, #FF6B00, #FF0000, #FF6B00);
            animation: fillPulse 0.5s infinite;
        }

        .gpu-fill {
            background: linear-gradient(90deg, #FFD700, #FF4500, #FFD700);
            animation: fillPulse 0.5s infinite;
        }

        @keyframes fillPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .log-container {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            display: none;
            margin-top: 20px;
            border: 2px solid #FF0000;
        }

        .log-entry {
            color: #0f0;
            font-size: 0.9em;
            margin: 5px 0;
            animation: fadeIn 0.2s;
        }

        .log-entry.warning {
            color: #fbbf24;
        }

        .log-entry.error {
            color: #FF0000;
            font-weight: bold;
        }

        .log-entry.info {
            color: #60a5fa;
        }

        .log-entry.success {
            color: #4ade80;
        }

        .log-entry.critical {
            color: #FF0000;
            font-weight: bold;
            text-shadow: 0 0 5px #FF0000;
            animation: blink 0.5s infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .stats {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid rgba(255, 0, 0, 0.5);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #FF0000;
            font-size: 1.8em;
            font-weight: bold;
            text-shadow: 0 0 10px #FF0000;
        }

        #stopBtn {
            background: linear-gradient(45deg, #000000, #333333);
            color: white;
            border: 3px solid #FF0000;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.6);
            font-weight: bold;
            display: none;
            margin: 20px auto;
        }

        #stopBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.8);
        }

        #gpuCanvas {
            display: none;
            width: 1px;
            height: 1px;
            position: absolute;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 0, 0, 0.5);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gpuCanvas"></canvas>
    <div class="container">
        <h1>💀 ULTIMATE SYSTEM DESTROYER 💀</h1>
        
        <div class="warning">
            ⚠️ CẢNH BÁO: CHƯƠNG TRÌNH NÀY SẼ TẢI HỆ THỐNG CỦA BẠN LÊN MỨC TỐI ĐA! ⚠️<br>
            CÓ THỂ GÂY CRASH, BLUE SCREEN, HOẶC ĐÓNG BĂNG HỆ THỐNG!<br>
            NHIỆT ĐỘ CPU/GPU SẼ TĂNG MẠNH!
        </div>
        
        <div class="start-section">
            <button id="startBtn">🔥 BẮT ĐẦU HỦY DIỆT 🔥</button>
        </div>

        <div class="status">
            <div class="status-text" id="statusText"></div>
            <div class="loader" id="loader"></div>
        </div>

        <div class="system-info" id="systemInfo">
            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">🔥</span> CPU OVERLOAD
                </div>
                <div class="resource-bar">
                    <div class="resource-fill cpu-fill" id="cpuFill">0%</div>
                </div>
            </div>

            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">💾</span> RAM DESTRUCTION
                </div>
                <div class="resource-bar">
                    <div class="resource-fill ram-fill" id="ramFill">0%</div>
                </div>
            </div>

            <div class="resource-section">
                <div class="resource-label">
                    <span class="resource-icon">🎮</span> GPU ANNIHILATION
                </div>
                <div class="resource-bar">
                    <div class="resource-fill gpu-fill" id="gpuFill">0%</div>
                </div>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="stat-label">THREADS</div>
                <div class="stat-value" id="threads">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">RAM USED</div>
                <div class="stat-value" id="ramAllocated">0 MB</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">GPU FRAMES</div>
                <div class="stat-value" id="gpuFrames">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time">0s</div>
            </div>
        </div>

        <button id="stopBtn">⛔ DỪNG KHẨN CẤP ⛔</button>

        <div class="log-container" id="logContainer"></div>
    </div>

    <script>
        let workers = [];
        let isRunning = false;
        let startTime;
        let ramArrays = [];
        let gpuAnimationId;
        let gpuFrameCount = 0;
        let logInterval;
        let statsInterval;
        let extraCanvases = [];

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const systemInfo = document.getElementById('systemInfo');
        const cpuFill = document.getElementById('cpuFill');
        const ramFill = document.getElementById('ramFill');
        const gpuFill = document.getElementById('gpuFill');
        const logContainer = document.getElementById('logContainer');
        const stats = document.getElementById('stats');
        const threadsEl = document.getElementById('threads');
        const ramAllocatedEl = document.getElementById('ramAllocated');
        const gpuFramesEl = document.getElementById('gpuFrames');
        const timeEl = document.getElementById('time');
        const canvas = document.getElementById('gpuCanvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        const logMessages = [
            { type: 'critical', msg: '💀 SYSTEM OVERLOAD IMMINENT!' },
            { type: 'error', msg: '🔥 CPU TEMPERATURE CRITICAL!' },
            { type: 'critical', msg: '⚠️ MEMORY PRESSURE EXTREME!' },
            { type: 'error', msg: '💥 GPU THERMAL THROTTLING!' },
            { type: 'warning', msg: '🌡️ All cores running at 100%!' },
            { type: 'critical', msg: '☢️ NUCLEAR LEVEL STRESS DETECTED!' },
            { type: 'error', msg: '🔥 System resources exhausted!' },
            { type: 'warning', msg: '💾 RAM allocation aggressive!' },
            { type: 'critical', msg: '⚡ POWER CONSUMPTION MAXIMUM!' },
            { type: 'error', msg: '🎮 GPU frame buffer overflow!' },
            { type: 'warning', msg: '🌀 Thread scheduler overloaded!' },
            { type: 'critical', msg: '💀 DANGER: SYSTEM INSTABILITY!' },
            { type: 'error', msg: '🔥 Thermal protection may engage!' },
            { type: 'info', msg: '📊 All performance counters maxed!' },
            { type: 'critical', msg: '☠️ MAXIMUM DESTRUCTION ACHIEVED!' },
            { type: 'warning', msg: '⚠️ Fan speed at maximum!' },
            { type: 'error', msg: '💥 Cache thrashing detected!' },
            { type: 'critical', msg: '🚨 EMERGENCY: SYSTEM AT LIMIT!' }
        ];

        function addLog(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            if (logContainer.children.length > 100) {
                logContainer.removeChild(logContainer.children[0]);
            }
        }

        function updateStats() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            timeEl.textContent = elapsed + 's';
            
            const ramUsed = (ramArrays.length * 100);
            ramAllocatedEl.textContent = ramUsed + ' MB';
            
            gpuFramesEl.textContent = gpuFrameCount.toLocaleString();
        }

        function startCPUStress() {
            const numThreads = 512;
            threadsEl.textContent = numThreads;

            for (let i = 0; i < numThreads; i++) {
                const workerCode = `
                    self.onmessage = function(e) {
                        if (e.data === 'start') {
                            while (true) {
                                let result = 0;
                                let bigMatrix = new Array(2000);
                                for (let m = 0; m < 2000; m++) {
                                    bigMatrix[m] = new Float64Array(2000);
                                }
                                
                                let tempArrays = [];
                                for (let t = 0; t < 100; t++) {
                                    tempArrays.push(new Float64Array(10000));
                                }
                                
                                for (let i = 0; i < 50000000; i++) {
                                    result += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                                    result += Math.pow(i, 3) / (i + 1);
                                    result += Math.tan(i) * Math.log(i + 1);
                                    result += Math.exp(i % 10) / (i + 1);
                                    result += Math.atan2(i, i + 1) * Math.sinh(i % 5);
                                    result += Math.cosh(i % 7) * Math.tanh(i % 3);
                                    result += Math.asin(Math.sin(i % 100) / 100) * Math.acos(Math.cos(i % 100) / 100);
                                    result += Math.cbrt(i) * Math.hypot(i, i + 1);
                                    result += Math.ceil(i / 3) * Math.floor(i / 5);
                                    result += Math.abs(Math.sin(i)) * Math.sign(Math.cos(i));
                                    result += Math.log10(i + 1) * Math.log2(i + 1);
                                    result += Math.expm1(i % 5) * Math.log1p(i);
                                    
                                    let temp = result;
                                    for (let j = 0; j < 15; j++) {
                                        temp = Math.sqrt(Math.abs(temp)) + Math.sin(temp);
                                        temp += Math.pow(temp % 10, 3);
                                        temp *= Math.cos(temp);
                                        temp /= Math.tan(temp % 5) + 1;
                                    }
                                    result += temp;
                                    
                                    if (i % 500 === 0) {
                                        let row = i % 2000;
                                        for (let col = 0; col < 2000; col++) {
                                            bigMatrix[row][col] = result * Math.sin(col) * Math.cos(row);
                                        }
                                    }
                                    
                                    if (i % 1000 === 0) {
                                        let arrIdx = i % 100;
                                        for (let k = 0; k < 10000; k++) {
                                            tempArrays[arrIdx][k] = result + k;
                                        }
                                    }
                                }
                                
                                let matrixSum = 0;
                                for (let r = 0; r < 2000; r++) {
                                    for (let c = 0; c < 2000; c++) {
                                        matrixSum += bigMatrix[r][c] * Math.sin(r) * Math.cos(c);
                                    }
                                }
                                
                                let arraySum = 0;
                                for (let t = 0; t < 100; t++) {
                                    for (let k = 0; k < 10000; k++) {
                                        arraySum += tempArrays[t][k];
                                    }
                                }
                                
                                self.postMessage(result + matrixSum + arraySum);
                            }
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                
                worker.postMessage('start');
                workers.push(worker);
            }
        }

        function startRAMStress() {
            const allocateRAM = () => {
                if (!isRunning) return;
                
                const size = 250 * 1024 * 1024;
                const array = new Uint8Array(size);
                
                for (let i = 0; i < array.length; i += 25) {
                    array[i] = Math.floor(Math.random() * 256);
                }
                
                for (let i = 0; i < array.length; i += 50) {
                    array[i] = array[i] ^ 0xFF;
                }
                
                for (let i = 0; i < array.length; i += 75) {
                    array[i] = (array[i] << 2) | (array[i] >> 2);
                }
                
                for (let i = 0; i < array.length; i += 100) {
                    array[i] = ~array[i];
                }
                
                ramArrays.push(array);
                
                const bigArray = new Float64Array(10 * 1024 * 1024);
                for (let i = 0; i < bigArray.length; i += 100) {
                    bigArray[i] = Math.random() * Math.PI;
                }
                ramArrays.push(bigArray);
                
                const ramPercent = Math.min(100, (ramArrays.length * 2.5));
                ramFill.style.width = ramPercent + '%';
                ramFill.textContent = ramPercent + '%';
                
                if (ramArrays.length < 40 && isRunning) {
                    setTimeout(allocateRAM, 20);
                }
            };
            
            for (let i = 0; i < 5; i++) {
                setTimeout(allocateRAM, i * 5);
            }
        }

        function startGPUStress() {
            if (!gl) {
                addLog('WebGL not supported, GPU stress skipped', 'warning');
                return;
            }

            canvas.width = 7680;
            canvas.height = 4320;

            for (let i = 0; i < 8; i++) {
                const extraCanvas = document.createElement('canvas');
                extraCanvas.width = 3840;
                extraCanvas.height = 2160;
                const extraGl = extraCanvas.getContext('webgl') || extraCanvas.getContext('experimental-webgl');
                if (extraGl) {
                    extraCanvases.push({canvas: extraCanvas, gl: extraGl});
                }
            }

            const vertexShaderSource = `
                attribute vec2 position;
                varying vec2 vUv;
                void main() {
                    vUv = position * 0.5 + 0.5;
                    gl_Position = vec4(position, 0.0, 1.0);
                }
            `;

            const fragmentShaderSource = `
                precision highp float;
                uniform float time;
                varying vec2 vUv;
                
                float hash(vec2 p) {
                    vec3 p3 = fract(vec3(p.xyx) * 0.1031);
                    p3 += dot(p3, p3.yzx + 33.33);
                    return fract((p3.x + p3.y) * p3.z);
                }
                
                float noise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    f = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
                    float a = hash(i);
                    float b = hash(i + vec2(1.0, 0.0));
                    float c = hash(i + vec2(0.0, 1.0));
                    float d = hash(i + vec2(1.0, 1.0));
                    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                }
                
                float fbm(vec2 p) {
                    float value = 0.0;
                    float amplitude = 0.5;
                    float frequency = 1.0;
                    for(int i = 0; i < 25; i++) {
                        value += amplitude * noise(p * frequency);
                        frequency *= 2.7;
                        amplitude *= 0.5;
                    }
                    return value;
                }
                
                float turbulence(vec2 p) {
                    float t = 0.0;
                    for(int i = 0; i < 15; i++) {
                        float fi = float(i);
                        t += abs(fbm(p * (fi + 1.0)) - 0.5) * 2.0;
                    }
                    return t;
                }
                
                float pattern(vec2 p, float t) {
                    float result = 0.0;
                    for(int i = 0; i < 25; i++) {
                        float fi = float(i);
                        result += fbm(p * (fi + 1.0) + t * (fi * 0.1));
                        result += sin(fbm(p * fi + t) * 20.0) * 0.5;
                        result += turbulence(p * (fi + 0.5) + t * 0.5) * 0.3;
                    }
                    return result;
                }
                
                vec3 complexColor(vec2 uv, float time) {
                    float n1 = pattern(uv + time * 0.5, time);
                    float n2 = pattern(uv * 2.0 - time * 0.3, time * 1.5);
                    float n3 = pattern(uv * 3.0 + time * 0.7, time * 2.0);
                    float n4 = pattern(uv * 4.0 + time * 0.9, time * 2.5);
                    float n5 = turbulence(uv * 5.0 + time);
                    
                    vec3 color = vec3(0.0);
                    for(int i = 0; i < 25; i++) {
                        float fi = float(i);
                        color.r += sin(n1 * 30.0 + time * (fi + 1.0)) * 0.02;
                        color.g += cos(n2 * 30.0 + time * (fi + 1.5)) * 0.02;
                        color.b += sin(n3 * 30.0 + time * (fi + 2.0)) * 0.02;
                    }
                    
                    color += vec3(n4, n5, (n4 + n5) * 0.5) * 0.5;
                    return color;
                }
                
                void main() {
                    vec2 uv = vUv * 100.0;
                    
                    vec3 color = complexColor(uv, time);
                    color += complexColor(uv * 1.5, time * 1.3) * 0.5;
                    color += complexColor(uv * 2.0, time * 1.7) * 0.3;
                    color += complexColor(uv * 2.5, time * 2.1) * 0.2;
                    
                    color = pow(color, vec3(3.0));
                    color = mix(color, vec3(1.0), fbm(uv + time) * 0.2);
                    color *= 1.0 + sin(time * 3.0) * 0.15;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            function setupContext(context) {
                function createShader(type, source) {
                    const shader = context.createShader(type);
                    context.shaderSource(shader, source);
                    context.compileShader(shader);
                    return shader;
                }

                const vertexShader = createShader(context.VERTEX_SHADER, vertexShaderSource);
                const fragmentShader = createShader(context.FRAGMENT_SHADER, fragmentShaderSource);

                const program = context.createProgram();
                context.attachShader(program, vertexShader);
                context.attachShader(program, fragmentShader);
                context.linkProgram(program);
                context.useProgram(program);

                const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
                const buffer = context.createBuffer();
                context.bindBuffer(context.ARRAY_BUFFER, buffer);
                context.bufferData(context.ARRAY_BUFFER, vertices, context.STATIC_DRAW);

                const position = context.getAttribLocation(program, 'position');
                context.enableVertexAttribArray(position);
                context.vertexAttribPointer(position, 2, context.FLOAT, false, 0, 0);

                return context.getUniformLocation(program, 'time');
            }

            const timeLocation = setupContext(gl);
            const extraTimeLocations = extraCanvases.map(({gl}) => setupContext(gl));

            let gpuPercent = 0;
            const gpuPercentInterval = setInterval(() => {
                if (gpuPercent < 100) {
                    gpuPercent += 33;
                    if (gpuPercent > 100) gpuPercent = 100;
                    gpuFill.style.width = gpuPercent + '%';
                    gpuFill.textContent = gpuPercent + '%';
                } else {
                    clearInterval(gpuPercentInterval);
                }
            }, 30);

            function render() {
                if (!isRunning) return;

                const time = performance.now() / 1000;

                for (let i = 0; i < 50; i++) {
                    gl.uniform1f(timeLocation, time + i * 0.005);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    gl.finish();
                }

                extraCanvases.forEach(({gl}, idx) => {
                    for (let i = 0; i < 20; i++) {
                        gl.uniform1f(extraTimeLocations[idx], time + i * 0.005);
                        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    }
                });
                
                gpuFrameCount += 210;

                gpuAnimationId = requestAnimationFrame(render);
            }

            render();
        }

        startBtn.addEventListener('click', function() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.disabled = true;
            statusText.textContent = '💀 ĐANG KHỞI ĐỘNG HỦY DIỆT HỆ THỐNG...';
            loader.style.display = 'block';
            
            setTimeout(() => {
                statusText.textContent = '🔥 HỆ THỐNG ĐANG BỊ THÁNH KHẢI ĐẾ CÔNG!!! 🔥';
                systemInfo.style.display = 'block';
                stats.style.display = 'grid';
                logContainer.style.display = 'block';
                stopBtn.style.display = 'block';
                
                let cpuUsage = 0;
                const cpuInterval = setInterval(() => {
                    if (cpuUsage < 100) {
                        cpuUsage += 50;
                        if (cpuUsage > 100) cpuUsage = 100;
                        cpuFill.style.width = cpuUsage + '%';
                        cpuFill.textContent = cpuUsage + '%';
                    } else {
                        clearInterval(cpuInterval);
                    }
                }, 25);
                
                startTime = Date.now();
                
                addLog('💀 ULTIMATE SYSTEM DESTROYER ACTIVATED!', 'critical');
                addLog('🔥 Deploying 512 CPU annihilation threads...', 'error');
                startCPUStress();
                
                setTimeout(() => {
                    addLog('💾 Initiating aggressive RAM destruction...', 'critical');
                    startRAMStress();
                }, 100);
                
                setTimeout(() => {
                    addLog('🎮 Launching GPU thermal meltdown protocol...', 'error');
                    startGPUStress();
                }, 150);
                
                logInterval = setInterval(() => {
                    const randomLog = logMessages[Math.floor(Math.random() * logMessages.length)];
                    addLog(randomLog.msg, randomLog.type);
                }, 200);
                
                statsInterval = setInterval(updateStats, 500);
                
            }, 1000);
        });

        stopBtn.addEventListener('click', function() {
            isRunning = false;
            
            workers.forEach(worker => worker.terminate());
            workers = [];
            
            ramArrays = [];
            
            if (gpuAnimationId) {
                cancelAnimationFrame(gpuAnimationId);
            }
            
            extraCanvases = [];
            
            clearInterval(logInterval);
            clearInterval(statsInterval);
            
            statusText.textContent = '⛔ HỆ THỐNG ĐÃ DỪNG KHẨN CẤP!';
            loader.style.display = 'none';
            addLog('⛔ Emergency shutdown initiated by user', 'warning');
            addLog('🔧 Terminating all 512 CPU threads...', 'info');
            addLog('💾 Releasing 10GB+ RAM allocations...', 'info');
            addLog('🎮 Stopping GPU rendering pipelines...', 'info');
            addLog('✅ All resources cleaned up successfully', 'success');
            addLog('🌡️ System cooling down...', 'info');
            
            setTimeout(() => {
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
                cpuFill.style.width = '0%';
                cpuFill.textContent = '0%';
                ramFill.style.width = '0%';
                ramFill.textContent = '0%';
                gpuFill.style.width = '0%';
                gpuFill.textContent = '0%';
                gpuFrameCount = 0;
            }, 1000);
        });
    </script>
</body>
</html>
